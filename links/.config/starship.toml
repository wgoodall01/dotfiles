# Powerline-ish prompt: colored segments, no arrows
# Only path + git info

add_newline = false
format = "$status$directory "
right_format = "$git_status$git_branch"

[status]
disabled = false
format = "[ $status ](bg:#ff69b4 fg:#000000 bold)"

[directory]
format = "[ $path ](bg:#3a3a3a fg:#bcbcbc)"
truncation_length = 4
truncate_to_repo = true

[git_branch]
format = "[ $branch ](bg:#005faf fg:#c0c0c0 bold)"

[git_status]
format = "$conflicted$untracked$modified$deleted$staged$stashed$ahead_behind"
ahead = "[ ⬆ $count ](bg:#585858 fg:#bcbcbc)"
behind = "[ ⬇ $count ](bg:#585858 fg:#bcbcbc)"
diverged = "[ ⬆ $ahead_count ⬇ $behind_count ](bg:#585858 fg:#bcbcbc)"
stashed = "[ ⚑$count ](bg:#ffd75f fg:#000000)"
staged = "[ $count✔ ](bg:#005f00 fg:#ffffff)"
modified = "[ $count✎ ](bg:#af5f00 fg:#ffffff)"
deleted = "[ $count✗ ](bg:#d70000 fg:#ffffff)"
untracked = "[ $count? ](bg:#5f0000 fg:#ffffff)"
conflicted = "[ $count✘ ](bg:#ff0000 fg:#ffffff)"
renamed = ""
up_to_date = ""
