# Powerline-ish prompt: colored segments, no arrows
# Only path + git info

add_newline = false
format = "$directory "
right_format = "$git_status$git_branch"

[directory]
format = "[ $path ](bg:#3a3a3a fg:#bcbcbc)"
truncation_length = 4
truncate_to_repo = true

[git_branch]
format = "[ $branch ](bg:#005faf fg:#c0c0c0 bold)"

[git_status]
format = "$conflicted$untracked$modified$staged$stashed$ahead_behind"
ahead = "[ ‚¨Ü $count ](bg:#585858 fg:#bcbcbc)"
behind = "[ ‚¨á $count ](bg:#585858 fg:#bcbcbc)"
diverged = "[ ‚¨Ü $ahead_count ‚¨á $behind_count ](bg:#585858 fg:#bcbcbc)"
stashed = "[ ‚öë$count ](bg:#ffd75f fg:#000000)"
staged = "[ $count‚úî ](bg:#005f00 fg:#ffffff)"
modified = "[ $count‚úé ](bg:#af5f00 fg:#ffffff)"
untracked = "[ $count? ](bg:#5f0000 fg:#ffffff)"
conflicted = "[ $count‚úò ](bg:#ff0000 fg:#ffffff)"
deleted = ""
renamed = ""
up_to_date = ""
